name: litellm-network-only

services:
  litellm:
    build:
      context: .
      args:
        target: runtime
    image: litellm-network-only:local
    command:
      - "--config=/app/config.network-only.yaml"
      - "--host=0.0.0.0"
      - "--port=4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://llmproxy:dbpassword9090@db:5432/litellm}"
      STORE_MODEL_IN_DB: "True"
    volumes:
      - ./docker/litellm.network-only.yaml:/app/config.network-only.yaml:ro
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: dbpassword9090
    expose:
      - "5432"
    volumes:
      - litellm_network_only_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U llmproxy"]
      interval: 1s
      timeout: 5s
      retries: 30

volumes:
  litellm_network_only_postgres_data:
    driver: local
